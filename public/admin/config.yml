backend:
  name: github
  repo: arbabmujtaba/arbabmujtaba.github.io
  branch: main
  # GitHub Pages is static and cannot serve /api/auth.
  # If you stay on GitHub Pages, set base_url/auth_endpoint to an external Decap OAuth proxy.
  # If you move to Netlify, use Git Gateway instead of this GitHub OAuth endpoint.
  squash_merges: true
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

# Enable local development proxy support
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "journal"
    label: "Journal"
    folder: "content/journal"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false, hint: "Full-bleed cinematic cover. Leave blank to use the default placeholder. No embedded text/logos — the site renders the title." }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Reading Time", name: "readingTime", widget: "string", required: false, hint: "e.g. 5 min read — auto-calculated from the body if left blank." }
      - { label: "Volume", name: "volume", widget: "number", required: false, value_type: "int", min: 1, hint: "Magazine issue number — auto-assigned by publish order if left blank." }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Editorial tags shown in the card metadata." }
      - { label: "Category", name: "category", widget: "select", required: false, options: ["Life", "People", "Travel", "Thoughts", "Milestones"] }
      - { label: "Published", name: "published", widget: "boolean", default: true, hint: "Uncheck to hide this entry from the live site." }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "tech"
    label: "Tech Logs"
    folder: "content/tech"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Category", name: "category", widget: "select", options: ["Tech News", "Things I Like", "Build Logs", "Experiments", "Linux", "Networking", "Programming"] }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "photography"
    label: "Photography"
    folder: "content/photography"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - { label: "Category", name: "category", widget: "select", options: ["Favorites", "Life", "Connected", "Travel", "Behind The Shot", "Gear"] }
      - { label: "Cover Image", name: "coverImage", widget: "image" }
      - { label: "Gallery Images", name: "galleryImages", widget: "list", field: { label: "Image", name: "image", widget: "image" } }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Story", name: "story", widget: "markdown" }

  - name: "collection"
    label: "Collections"
    folder: "content/collection"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Uses", "Music", "Books", "Gear", "Timeline", "Inspirations", "Favorites"] }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "portfolio"
    label: "Portfolio Projects"
    folder: "content/portfolio"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Tech Stack", name: "techStack", widget: "list", field: { label: "Tech", name: "tech", widget: "string" } }
      - { label: "GitHub Link", name: "githubLink", widget: "string", required: false }
      - { label: "Live Link", name: "liveLink", widget: "string", required: false }
      - { label: "Project Image", name: "projectImage", widget: "image" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
