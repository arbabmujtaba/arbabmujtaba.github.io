<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Journal cover placeholder">
  <defs>
    <!-- Deep editorial base gradient -->
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121211"/>
      <stop offset="0.55" stop-color="#0c0c0b"/>
      <stop offset="1" stop-color="#060605"/>
    </linearGradient>
    <!-- Warm cinematic light bloom (matches the site's orange accent) -->
    <radialGradient id="bloom" cx="0.72" cy="0.28" r="0.85">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.30"/>
      <stop offset="0.35" stop-color="#b4530f" stop-opacity="0.12"/>
      <stop offset="0.7" stop-color="#0c0c0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Cool counter-light from the lower left for depth -->
    <radialGradient id="cool" cx="0.18" cy="0.85" r="0.8">
      <stop offset="0" stop-color="#27323d" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#10120f" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom vignette so site-rendered typography always stays legible -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.78"/>
    </linearGradient>
    <!-- Subtle film grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Layered cinematic field (no text, no logos, no watermarks) -->
  <rect width="1600" height="1000" fill="url(#base)"/>
  <rect width="1600" height="1000" fill="url(#cool)"/>
  <rect width="1600" height="1000" fill="url(#bloom)"/>

  <!-- Soft architectural light streaks for an editorial, photographic feel -->
  <g opacity="0.5" fill="none" stroke="#f5f5f4" stroke-opacity="0.04" stroke-width="1">
    <path d="M-100 240 L1700 60"/>
    <path d="M-100 430 L1700 250"/>
    <path d="M-100 640 L1700 470"/>
    <path d="M-100 860 L1700 700"/>
  </g>
  <g opacity="0.6">
    <ellipse cx="1180" cy="300" rx="520" ry="360" fill="#f97316" fill-opacity="0.05"/>
    <ellipse cx="360" cy="760" rx="460" ry="320" fill="#3b4a59" fill-opacity="0.06"/>
  </g>

  <!-- Grain + bottom vignette -->
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.6"/>
  <rect width="1600" height="1000" fill="url(#vignette)"/>
</svg>
